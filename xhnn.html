function displayJobs(data){
    const container=document.getElementById('job-list');
    container.innerHTML='';
    data.forEach((job,i)=>{
        const div=document.createElement('div');
        div.classList.add('job-card');
        div.innerHTML=`
            <h3>${job.Nganh_nghe} (${job.Quoc_gia})</h3>
            <p><strong>Xu hướng tuyển dụng:</strong> ${job.Xu_huong}</p>
            <p><strong>Tiềm năng phát triển:</strong> ${job.Pham_vi}</p>
            <p><strong>Kỹ năng/Tố chất:</strong> ${job.Ky_nang}</p>
            <p><strong>MBTI phù hợp:</strong> ${job.MBTI.split(",").map(m=>`<a href="https://www.16personalities.com/vi/${m.toLowerCase()}" target="_blank">${m}</a>`).join(", ")}</p>
            <p><strong>Nguồn:</strong> ${job.Nguon}</p>
        `;
        container.appendChild(div);
        setTimeout(()=>{div.classList.add('show')},i*80);
    });
}

document.getElementById('country-filter').addEventListener('change',(e)=>{
    const val=e.target.value;
    if(val==="All") displayJobs(jobsData);
    else displayJobs(jobsData.filter(job=>job.Quoc_gia===val));
});

// Load trang
displayJobs(jobsData);
